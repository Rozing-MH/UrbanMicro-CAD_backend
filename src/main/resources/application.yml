server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: urbanmicro-cad-backend
  datasource:
    url: jdbc:postgresql://db.zmxmndexptzuynyuqitb.supabase.co:5432/postgres
    username: postgres
    password: Rozing096mh
    driver-class-name: org.postgresql.Driver
  # 本地开发无 Redis，禁用自动配置避免连接失败
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://127.0.0.1:5177}
  jwt:
    secret: ${JWT_SECRET:this-is-a-dev-only-secret-key-that-is-at-least-32-chars-long}
    expires-minutes: ${JWT_EXPIRES_MINUTES:1440}
  rate-limit:
    login-max-requests: ${RATE_LIMIT_LOGIN_MAX:10}
    login-window-seconds: ${RATE_LIMIT_LOGIN_WINDOW:60}
    register-max-requests: ${RATE_LIMIT_REGISTER_MAX:5}
    register-window-seconds: ${RATE_LIMIT_REGISTER_WINDOW:60}
