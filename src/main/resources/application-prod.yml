# Production profile — security hardening and operational tuning

spring:
  datasource:
    hikari:
      "maximum-pool-size": ${HIKARI_MAX_POOL_SIZE:10}
      "minimum-idle": ${HIKARI_MIN_IDLE:3}
      "idle-timeout": 300000          # 5 minutes
      "max-lifetime": 1800000         # 30 minutes
      "connection-timeout": 30000     # 30 seconds
      "leak-detection-threshold": 60000  # 1 minute — logs warning if connection held too long
  jackson:
    default-property-inclusion: non_null

# Logging — structured output for production
logging:
  level:
    root: WARN
    com.urbanmicrocad: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    com.baomidou.mybatisplus: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Disable API docs in production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Actuator — only health endpoint, no details exposed
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Rate limiting — stricter in production
app:
  rate-limit:
    login-max-requests: ${RATE_LIMIT_LOGIN_MAX:10}
    login-window-seconds: ${RATE_LIMIT_LOGIN_WINDOW:60}
    register-max-requests: ${RATE_LIMIT_REGISTER_MAX:5}
    register-window-seconds: ${RATE_LIMIT_REGISTER_WINDOW:60}
