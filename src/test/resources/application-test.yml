spring:
  datasource:
    url: jdbc:h2:mem:urbanmicro;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

mybatis-plus:
  db-type: H2
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

app:
  cors:
    allowed-origins: http://localhost:5173
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    expires-minutes: 60
