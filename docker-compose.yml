services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: urbanmicro
      POSTGRES_USER: urbanmicro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanmicro"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/urbanmicro
      SPRING_DATASOURCE_USERNAME: urbanmicro
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      # Optional: mount custom fonts for PDF generation
      # Place SimHei.ttf or other CJK fonts in ./fonts/ on the host
      - ./fonts:/app/fonts:ro
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
